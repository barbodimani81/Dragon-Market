services:
  postgres:
    image: postgres:16-alpine
    container_name: dragon_market_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${APP_DATABASE__PASSWORD}
      POSTGRES_DB: dragon_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dragon_market"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
