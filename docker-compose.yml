services:
  postgres:
    image: postgres:16-alpine
    container_name: dragon_market_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${APP_DATABASE__PASSWORD}
      POSTGRES_DB: dragon_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dragon_market"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_DATABASE__PASSWORD=${APP_DATABASE__PASSWORD}
      - DB_HOST=postgres # 👈 Changed from 'db' to match the service name above
    depends_on:
      postgres: # 👈 Changed from 'db' to match the service name above
        condition: service_healthy # Wait until postgres is actually ready to take data!

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./api:/openapi
    depends_on:
      - app

volumes:
  pgdata:
