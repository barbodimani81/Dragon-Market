type: object
required:
  - auction_id
  - item
  - seller_id
  - current_highest_bid
  - current_highest_bidder
  - start_price
  - status
  - expires_at
  - created_at
properties:
  auction_id:
    type: string
    format: uuid
    example: "018e3a2f-1234-7000-8000-000000000301"
  item:
    $ref: './ItemResponse.yaml'
  seller_id:
    type: string
    format: uuid
    example: "018e3a2f-1234-7000-8000-000000000003"
  current_highest_bid:
    type: integer
    nullable: true
    example: 55000
  current_highest_bidder:
    type: string
    format: uuid
    nullable: true
    example: "018e3a2f-1234-7000-8000-000000000002"
  start_price:
    type: integer
    example: 50000
  status:
    type: string
    enum: [ACTIVE, COMPLETED, CANCELLED]
    example: "ACTIVE"
  expires_at:
    type: string
    format: date-time
    example: "2026-07-17T17:15:00Z"
  created_at:
    type: string
    format: date-time
    example: "2026-07-16T17:15:00Z"
