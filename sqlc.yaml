version: "2"
sql:
  - engine: "postgresql"
    schema: "migration/"
    queries: "internal/"
    gen:
      go:
        package: "repository"
        out: "internal/database/gen"
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
